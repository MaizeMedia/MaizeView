version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      all:
        patterns: ["*"]

  - package-ecosystem: cargo
    directory: "/src-tauri"
    schedule:
      interval: weekly
      day: monday
    groups:
      all:
        patterns: ["*"]
    # Hold breaking majors that need a deliberate migration PR instead of a
    # group bump (image/rand/dirs/md-5 majors are unreviewed API
    # changes). sqlx 0.9 landed via its own migration PR; notify deps were
    # unused and removed outright.
    ignore:
      - dependency-name: "image"
        versions: [">= 0.24"]
      - dependency-name: "rand"
        versions: [">= 0.10"]
      - dependency-name: "dirs"
        versions: [">= 6"]
      - dependency-name: "md-5"
        versions: [">= 0.11"]
