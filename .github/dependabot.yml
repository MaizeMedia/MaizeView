version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      all:
        patterns: ["*"]

  - package-ecosystem: cargo
    directory: "/src-tauri"
    schedule:
      interval: weekly
      day: monday
    groups:
      all:
        patterns: ["*"]
    # Hold breaking majors that need a deliberate migration PR instead of a
    # group bump (see closed PR #2 — sqlx 0.9's AssertSqlSafe gate broke the
    # build; notify/image/rand/dirs/md-5 majors are unreviewed API changes).
    ignore:
      - dependency-name: "sqlx"
        versions: [">= 0.9"]
      - dependency-name: "notify"
        versions: [">= 8"]
      - dependency-name: "notify-debouncer-full"
        versions: [">= 0.5"]
      - dependency-name: "image"
        versions: [">= 0.24"]
      - dependency-name: "dirs"
        versions: [">= 6"]
      - dependency-name: "md-5"
        versions: [">= 0.11"]
