version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    groups:
      all:
        patterns: ["*"]

  - package-ecosystem: cargo
    directory: "/src-tauri"
    schedule:
      interval: weekly
      day: monday
    groups:
      all:
        patterns: ["*"]
    # No holds: all majors migrated (sqlx 0.9, rand 0.10, dirs 6, md-5
    # 0.11, image 0.25) or removed as unused (notify). Breaking majors get
    # a dedicated migration PR instead of a group bump — see dev log.
